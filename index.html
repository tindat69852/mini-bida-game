<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Billiard Pocket Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <div class="top-bar">
      <div>
        <h1>Mini Billiard</h1>
        <p>Kéo chuột để ngắm, thả ra để bắn bi trắng.</p>
      </div>
      <div class="score-box">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="score-box">
        <span>Shots</span>
        <strong id="shots">0</strong>
      </div>
    </div>

    <canvas id="gameCanvas" width="900" height="520"></canvas>

    <div class="controls">
      <button id="restartBtn">Chơi lại</button>
      <p id="message">Đưa tất cả bi màu vào lỗ để thắng!</p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
